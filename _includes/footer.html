<footer>
  <div class="footer__content">
    <ul class="footer__social">
      <li>
        <a href="{{ site.github }}" class="nav__social-link" target="_blank" rel="noopener" aria-label="GitHub">
          {% include icons/_github.html %}
        </a>
      </li>
      <li>
        <a href="{{ site.linkedin }}" class="nav__social-link" target="_blank" rel="noopener" aria-label="LinkedIn">
          {% include icons/_linkedin.html %}
        </a>
      </li>
      <li>
        <a href="{{ site.twitter }}" class="nav__social-link" target="_blank" rel="noopener" aria-label="Twitter">
          {% include icons/_twitter.html %}
        </a>
      </li>
    </ul>
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
  </div>
</footer>
